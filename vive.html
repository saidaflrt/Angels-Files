<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* fonts used for this website */
        @font-face {
            font-family: font;
            src: url(font/Sora-Bold.ttf);
        }
        @font-face {
            font-family: font1;
            src: url(font/Sora-Light.ttf);
        }
        @font-face {
            font-family: font2;
            src: url(font/Sora-Regular.ttf);
        }

        /*background is designed with a picture with a faint green color on top */
        body {
           background: linear-gradient(rgba(71, 135, 120, 0.7), rgba(71, 135, 120, 0.7)), 
              url(images/vive.png);
           background-size: cover;
           background-position: center;
           min-height: 100vh;
           font-family: font;
           animation: fadeIn 1s ease;
           overflow: hidden;
        }

        /* gives a fade in effect when starting up the website */
        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        /* container for the elements in the header (title and button) */
        .header {
            align-items: center;
            display: flex;
            justify-content: center;
            flex-direction: row;
            gap:0;
            padding: 0;
        }

        /* elements in the header container */
        .header a{
            color: #4d8d7d;
            background-color: beige;
            padding: 5px 15px;
            border-radius: 3px;
            text-decoration: none;
            position: relative;
            right: 210px;
            font-family: font1;
            transition: transform 0.2s ease;
        }
        .header a:hover{
            transform: scale(1.1);
            cursor: pointer;
        }
        .header h1 {
            color: beige;
            font-size: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            top: 70px;
            right: 90px;
            font-family: font;
        }

        /*                                   */

        /* unordered list containing the location and contact information of the selected community */
        .info{
            display: flex;
            list-style: none;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap:100px;
            position: relative;
            right: 35px;
            top: 100px;
        }

        /* container for the location of the selected community (embedded map and address) */
        .cont1{
            align-items: center;
            display: flex;
            justify-content: center;
            flex-direction: column;
            background-color: #4d8d7d;
            color: beige;
            border-radius: 5px;
            width: 350px;
            height: 400px;
            font-family: font2;
            font-size: 15px;
        }

        /* elements in container cont1 */
        .cont1 iframe {
            align-items: center;
            display: flex;
            justify-content: center;
            position: relative;
            border: 0;
            border-top-left-radius: 5px;
            border-top-right-radius: 5px;
        }
        #add {
            align-items: center;
            display: flex;
            justify-content: center;
            position: relative;
            bottom: 10px;
            right: 90px;
            font-family: font1;
        }
        #add1 {
            align-items: center;
            display: flex;
            justify-content: center;
            text-align: center;
            position: relative;
            bottom: 20px;
            font-family: font2;
            font-size: 15px;
        }
        /*                             */

        /* container for the contact information of the selected community (phone number, email, website, and social medias) */
        .cont2{
            align-items: center;
            display: flex;
            justify-content: center;
            flex-direction: column;
            background-color: #4d8d7d;
            color: beige;
            border-radius: 5px;
            width: 350px;
            height: 400px;
            font-family: font2;
            font-size: 15px;
        }

        /* elements in container cont2 */
        #phone{
            align-items: center;
            display: flex;
            justify-content: center;
            position: relative;
            right: 100px;
            bottom: 5px;
            font-family: font1;
        }
        #number{
            align-items: center;
            display: flex;
            justify-content: center;
            position: relative;
            bottom: 20px;
            font-family: font1;
            font-size: 30px;
            color: beige;
        }
        #email{
            align-items: center;
            display: flex;
            justify-content: center;
            position: relative;
            right: 105px;
            bottom: 30px;
            font-family: font1;
        }
        #email1{
            align-items: center;
            display: flex;
            justify-content: center;
            position: relative;
            bottom: 40px;
            font-family: font1;
            font-size: 17px;
            color: beige;
        }
        #web{
            align-items: center;
            display: flex;
            justify-content: center;
            position: relative;
            right: 85px;
            bottom: 40px;
            font-family: font1;
        }
        #site{
            align-items: center;
            display: flex;
            justify-content: center;
            position: relative;
            bottom: 60px;
            font-family: font1;
            color: beige;
        }
        .socials{
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: row;
            gap: 20px;
            position: relative;
            bottom: 40px;
        }
        .icons {
            transition: transform 0.2s ease;
        }
        /*                             */

        /* gives indication that the icons are clickable */
        .icons:hover{
            transform: scale(1.1);
            cursor: pointer;
        }

        /* format for the website to respond on a standard phone */
        @media (max-width: 768px) {
            body {
                background-attachment: scroll;
            }
            .header {
                flex-direction: column;
                align-items: center;
                padding: 20px 16px 0;
            }
            .header a {
                position: static;
                align-self: flex-start;
                font-size: 14px;
                margin-bottom: 8px;
            }
            .header h1 {
                position: static;
                font-size: 26px;
                text-align: center;
                margin: 12px 0 24px;
            }
            .info {
                flex-direction: column;
                position: static;
                gap: 24px;
                padding: 0 16px 40px;
                width: 100%;
                align-items: center;
            }
            .info li {
                width: 100%;
                display: flex;
                justify-content: center;
            }
            .cont1 {
                width: 100%;
                max-width: 360px;
                height: auto;
                padding-bottom: 16px;
            }
            .cont1 iframe {
                width: 100%;
                height: 220px;
            }
            #add {
                position: static;
                margin: 12px 0 4px;
                font-size: 18px;
            }
            #add1 {
                position: static;
                margin: 0 12px;
                font-size: 14px;
            }
            .cont2 {
                width: 100%;
                max-width: 360px;
                height: auto;
                padding: 20px 16px;
                gap: 0;
            }
            #phone {
                position: static;
                margin: 0 0 4px;
                font-size: 18px;
            }
            #number {
                position: static;
                font-size: 24px;
                margin: 0 0 12px;
            }
            #email {
                position: static;
                margin: 0 0 4px;
                font-size: 18px;
            }
            #email1 {
                position: static;
                font-size: 14px;
                margin: 0 0 12px;
                text-align: center;
                word-break: break-all;
            }
            #web {
                position: static;
                margin: 0 0 4px;
                font-size: 18px;
            }
            #site {
                position: static;
                margin: 0 0 12px;
                font-size: 16px;
            }
            .socials {
                position: static;
                margin-top: 8px;
            }
            .cont1:hover,
            .cont2:hover {
                transform: none;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
    <div class = "header">
        <a href = "elderly.html">Home for the Elderly</a>
        <h1>Vive Rie Ama Swigert Homes</h1>
    </div>
    <div class = "cont">
        <ul class = "info">
            <li>
                <div class = "cont1"> 
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3862.832871834761!2d121.00783459999998!3d14.494281800000003!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3397cf0057db9ae7%3A0xdc1f7eef31ec74d1!2sVive%20Rie%20Ama%20Swigert%20Homes!5e0!3m2!1sen!2sph!4v1779435502163!5m2!1sen!2sph" 
                    width="350" height="300">
                </iframe>
                <h1 id = "add">Address:</h1>
                <p id = "add1">206 Swigert St. Romvi Subdivision Phase 2, Bgy. Moonwalk, Parañaque, Philippines, 1709</p>
                </div>
            </li>
            <li>
                <div class = "cont2">
                    <h1 id = "phone">Phone:</h1>
                    <a id = "number" href ="tel:0954 345 7416">0954 345 7416</a>
                    <h1 id = "email">Email:</h1>
                    <a id = "email1" href = "mailto:viverieamaswigerthomes@gmail.com" target="_self">viverieamaswigerthomes@gmail.com</a>
                    <h1 id = "web">Website:</h1>
                    <h2 id = "site" >No Website</h2>
                    <div class = "socials">
                        <img class = "icons" id = "fb" src = "images/fb.png" width="50" height="50">
                    </div>
                </div>
            </li>
        </ul>
    </div>
    <script>
        /* manages the navigation of users to access external links */
        
        const fb = document.getElementById('fb');
        fb.addEventListener('click', function (){
            window.open("https://www.facebook.com/viverieamanursingcareswigerthomes/")
        });
    </script>
</body>
</html>
